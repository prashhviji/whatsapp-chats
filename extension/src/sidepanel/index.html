<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhatsApp Summarizer</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --border: #e4e7ec;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #059669;
        --accent-weak: #ecfdf5;
        --danger: #b91c1c;
        --danger-weak: #fef2f2;
        --warn-weak: #fffbeb;
        --warn: #92400e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
      h1 { font-size: 16px; margin: 0; }
      .sub { color: var(--muted); font-size: 12px; margin: 2px 0 0; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      .card.accent { border-color: #6ee7b7; }
      .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 8px; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      input[type="text"], input[type="url"], input[type="number"] {
        width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px; font: inherit; background: #fff;
      }
      input:focus { outline: none; border-color: var(--accent); }
      .row { display: flex; gap: 8px; }
      .btn {
        border: none; border-radius: 9px; padding: 10px 14px; font: inherit; font-weight: 600; cursor: pointer;
      }
      .btn-primary { background: var(--accent); color: #fff; width: 100%; }
      .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
      .status { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }
      .error { background: var(--danger-weak); color: var(--danger); padding: 8px 10px; border-radius: 8px; font-size: 13px; }
      .note { background: var(--warn-weak); color: var(--warn); padding: 8px 10px; border-radius: 8px; font-size: 12px; }
      ul { margin: 0; padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; }
      .pill { display: inline-block; background: #f1f5f9; border-radius: 999px; padding: 3px 10px; font-size: 12px; margin: 0 4px 4px 0; }
      .pill .c { color: var(--muted); }
      .badge { display: inline-block; background: var(--accent-weak); color: var(--accent); border-radius: 6px; padding: 1px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-right: 6px; }
      .cite {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--accent);
        background: var(--accent-weak); border: none; border-radius: 5px; padding: 1px 5px; margin-left: 4px; cursor: pointer;
      }
      .cite:hover { background: #d1fae5; }
      details > summary { cursor: pointer; font-size: 12px; color: var(--muted); font-weight: 600; }
      .msg { font-size: 12px; padding: 3px 6px; border-radius: 6px; scroll-margin-top: 10px; }
      .msg .id { font-family: ui-monospace, monospace; color: #9ca3af; }
      .msg .who { font-weight: 600; }
      .msg.hl { background: #d1fae5; box-shadow: inset 0 0 0 1px #6ee7b7; }
      .muted { color: var(--muted); font-size: 12px; }
      .stack { display: flex; flex-direction: column; gap: 12px; }

      /* --- Story mode ------------------------------------------------------ */
      .story { background: linear-gradient(160deg, #0f172a, #1e293b); border-color: #334155; color: #e5e7eb; }
      .story .section-title { color: #94a3b8; }
      .story-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .story-head .muted { color: #94a3b8; }
      .story-stage { text-align: center; padding: 8px 4px 2px; min-height: 156px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .story-emoji { font-size: 56px; line-height: 1; animation: storyPop .38s ease; }
      .story-narration { font-size: 15px; line-height: 1.5; margin: 0; color: #f1f5f9; animation: storyFade .4s ease; }
      .story-cast { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
      .avatar { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 3px 10px 3px 6px; font-size: 12px; }
      .avatar .a-emoji { font-size: 16px; }
      .avatar .a-name { color: #cbd5e1; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .story-cites .cite { background: rgba(52,211,153,.15); color: #6ee7b7; }
      .story-cites .cite:hover { background: rgba(52,211,153,.28); }
      .scrubber { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; border-radius: 999px; margin: 14px 0 10px; background: #334155; accent-color: #34d399; cursor: pointer; }
      .scrubber::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #34d399; border: 3px solid #064e3b; cursor: grab; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
      .scrubber::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.12); }
      .story-controls { display: flex; gap: 6px; justify-content: center; align-items: center; }
      .iconbtn { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #e5e7eb; border-radius: 9px; padding: 7px 11px; font-size: 15px; line-height: 1; cursor: pointer; }
      .iconbtn:hover:not(:disabled) { background: rgba(255,255,255,.18); }
      .iconbtn:disabled { opacity: .35; cursor: not-allowed; }
      .iconbtn.play { background: var(--accent); border-color: #10b981; min-width: 48px; }
      .iconbtn.play:hover { background: #0f9d6b; }
      .story-hint { text-align: center; color: #94a3b8 !important; margin: 8px 0 0; }
      @keyframes storyPop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
      @keyframes storyFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./sidepanel.js"></script>
  </body>
</html>
